name: CI - Validate Frontend Assets

on:
  push:
    branches: [main, "Coding-Krakken/**", "copilot/**"]
  pull_request:
    branches: [main]

jobs:
  validate-frontend:
    runs-on: ubuntu-latest
    name: Frontend Validation Suite
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend validation
        run: npm run validate

      - name: Run frontend typecheck gate
        run: npm run typecheck

      - name: Run frontend build gate
        run: npm run build

  validate-structure:
    runs-on: ubuntu-latest
    name: Validate HTML/CSS/JS Structure
    steps:
      - uses: actions/checkout@v4

      - name: Validate templates exist
        run: |
          echo "Checking templates..."
          test -f frontend/templates/homepage.html || (echo "Missing homepage.html" && exit 1)
          test -f frontend/templates/service-template.html || (echo "Missing service-template.html" && exit 1)
          test -f frontend/templates/location-template.html || (echo "Missing location-template.html" && exit 1)
          test -f frontend/templates/emergency-landing.html || (echo "Missing emergency-landing.html" && exit 1)
          echo "✓ All templates present"

      - name: Validate CSS exists and has tokens
        run: |
          echo "Checking CSS..."
          test -f frontend/assets/css/system.css || (echo "Missing system.css" && exit 1)
          grep -q ":root {" frontend/assets/css/system.css || (echo "No CSS variables" && exit 1)
          grep -q "@media" frontend/assets/css/system.css || (echo "No media queries" && exit 1)
          echo "✓ CSS structure valid"

      - name: Validate JavaScript
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Check JS syntax
        run: |
          echo "Checking JS syntax..."
          node --check frontend/assets/js/system.js || exit 1
          echo "✓ JS syntax valid"

      - name: Check for debug artifacts
        run: |
          echo "Checking for debug code..."
          if grep "console\.log" frontend/assets/js/system.js; then
            echo "✗ console.log found"
            exit 1
          fi
          if grep "debugger" frontend/assets/js/system.js; then
            echo "✗ debugger found"
            exit 1
          fi
          echo "✓ No debug artifacts"

  validate-html:
    runs-on: ubuntu-latest
    name: Validate HTML Templates
    steps:
      - uses: actions/checkout@v4

      - name: Check HTML structure
        run: |
          echo "Validating HTML structure..."
          for template in frontend/templates/*.html; do
            echo "Checking $template"
            grep -q "<!doctype html>" "$template" || (echo "✗ Missing doctype in $template" && exit 1)
            grep -q "<html" "$template" || (echo "✗ Missing html tag in $template" && exit 1)
            grep -q "<body" "$template" || (echo "✗ Missing body tag in $template" && exit 1)
            grep -q "<main" "$template" || (echo "✗ Missing main tag in $template" && exit 1)
            grep -q "skip-link" "$template" || (echo "⚠ No skip-link in $template")
          done
          echo "✓ HTML structure valid"

  validate-accessibility:
    runs-on: ubuntu-latest
    name: Accessibility Checks
    steps:
      - uses: actions/checkout@v4

      - name: Check a11y patterns
        run: |
          echo "Checking accessibility patterns..."
          for template in frontend/templates/*.html; do
            echo "- $template"
            # Check skip links
            grep -q "skip-link" "$template" && echo "  ✓ Skip link" || echo "  ⚠ No skip link"
            # Check for form labels
            if grep -q "<form" "$template"; then
              grep -q '<label' "$template" && echo "  ✓ Labels present" || echo "  ✗ No labels"
              grep -q 'aria-live' "$template" && echo "  ✓ Aria-live" || echo "  ⚠ No aria-live"
            fi
            # Check for required attributes
            grep -q 'aria-expanded' "$template" && echo "  ✓ Aria attributes present"
          done
          echo "✓ Accessibility checks complete"

  validate-conversion:
    runs-on: ubuntu-latest
    name: Validate Conversion Paths
    steps:
      - uses: actions/checkout@v4

      - name: Check CTAs and forms
        run: |
          echo "Validating conversion paths..."
          for template in frontend/templates/*.html; do
            echo "- $template"
            cta_count=$(grep -c "data-track=" "$template" || echo 0)
            form_count=$(grep -c "<form" "$template" || echo 0)
            echo "  CTAs: $cta_count, Forms: $form_count"
            test $cta_count -gt 0 || echo "  ⚠ No tracked CTAs"
          done
          echo "✓ Conversion validation complete"

  validate-workflows:
    runs-on: ubuntu-latest
    name: Validate Workflow YAML
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint workflow files
        run: |
          echo "Linting GitHub Actions workflow files..."
          yamllint -d "{extends: relaxed, rules: {line-length: {max: 200}, truthy: {allowed-values: ['true', 'false', 'on', 'off']}}}" .github/workflows/
          echo "✓ All workflow YAML files are valid"

      - name: Validate vercel.json
        run: |
          echo "Validating vercel.json..."
          python3 -c "import json, sys; data=json.load(open('vercel.json')); \
            assert 'headers' in data, 'Missing headers'; \
            assert 'rewrites' in data, 'Missing rewrites'; \
            print('✓ vercel.json is valid JSON with required fields')"
          echo "✓ vercel.json validation complete"

  check-documentation:
    runs-on: ubuntu-latest
    name: Documentation Completeness
    steps:
      - uses: actions/checkout@v4

      - name: Verify key docs
        run: |
          echo "Checking documentation..."
          required_docs=(
            "ACCEPTANCE-CRITERIA.md"
            "SECURITY.md"
            "vercel.json"
            "frontend/IMPLEMENTATION-GUIDE.md"
            "frontend/components/README.md"
            "docs/program/README.md"
            "docs/program/PROGRAM-CHARTER.md"
            "docs/program/KPI-BASELINE-SHEET.md"
            "docs/program/GO-NO-GO-CRITERIA.md"
            "docs/program/ENVIRONMENT-SETUP.md"
            "docs/program/CICD-WORKFLOW.md"
            "docs/program/SECURITY-BASELINE.md"
            "docs/program/ESCALATION-PROCEDURES.md"
            "docs/program/ADR-0002-hosting-platform-selection.md"
            "docs/program/ADR-0003-monitoring-and-alerting-stack.md"
            "docs/program/ADR-0004-secrets-management.md"
            "docs/program/ADR-0005-rollback-strategy.md"
            "design-system/TOKENS.md"
          )
          missing=0
          for doc in "${required_docs[@]}"; do
            if test -f "$doc"; then
              echo "✓ $doc"
            else
              echo "✗ Missing $doc"
              missing=1
            fi
          done
          test $missing -eq 0
          echo "✓ Documentation check complete"

  summary:
    runs-on: ubuntu-latest
    name: CI Summary
    needs: [validate-frontend, validate-structure, validate-html, validate-accessibility, validate-conversion, validate-workflows, check-documentation]
    if: always()
    steps:
      - name: Print status
        run: |
          echo "==================================="
          echo "✅ CI Pipeline Complete"
          echo "==================================="
          echo ""
          echo "Validations performed:"
          echo "  ✓ Frontend lint, stylelint, and Jest"
          echo "  ✓ Frontend typecheck"
          echo "  ✓ Frontend build validation"
          echo "  ✓ File structure"
          echo "  ✓ HTML syntax"
          echo "  ✓ CSS structure"
          echo "  ✓ JavaScript syntax"
          echo "  ✓ No debug artifacts"
          echo "  ✓ Accessibility patterns"
          echo "  ✓ Conversion paths"
          echo "  ✓ Workflow YAML lint"
          echo "  ✓ Documentation"
          echo ""
          echo "Status: All checks passed ✅"
