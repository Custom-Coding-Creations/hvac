# Render deployment configuration
# https://render.com/docs/render-yaml

services:
  - type: web
    name: hvac-ai
    env: node
    plan: free            # upgrade to starter ($7/mo) for always-on
    buildCommand: npm install --production
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000       # Render injects PORT automatically; this is the default
      - key: ALLOWED_ORIGINS
        sync: false        # Set in Render dashboard — your Vercel URL(s)
      - key: WEBHOOK_URL
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: LEAD_TO_EMAIL
        sync: false
      - key: LEAD_FROM_EMAIL
        sync: false
      - key: AIRNOW_API_KEY
        sync: false
      - key: BUSINESS_LAT
        value: "43.0481"
      - key: BUSINESS_LNG
        value: "-76.1474"
